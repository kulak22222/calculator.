<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Bexruzni kichik kalkulatori
  </title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: Arial;
    }

    .calc {
      width: 260px;
      background: #222;
      padding: 15px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      height: 50px;
      font-size: 22px;
      margin-bottom: 10px;
      text-align: right;
      padding-right: 10px;
    }

    button {
      width: 60px;
      height: 60px;
      margin: 5px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }

    .btn {
      background: #333;
      color: white;
    }

    .equal {
      background: orange;
      color: white;
      width: 130px;
    }

    .clear {
      background: red;
      color: white;
      width: 130px;
    }
  </style>
</head>
<body>

<div class="calc">
  <input type="text" id="display" disabled>

  <div>
    <button class="btn" onclick="press('7')">7</button>
    <button class="btn" onclick="press('8')">8</button>
    <button class="btn" onclick="press('9')">9</button>
    <button class="btn" onclick="press('/')">/</button>
  </div>

  <div>
    <button class="btn" onclick="press('4')">4</button>
    <button class="btn" onclick="press('5')">5</button>
    <button class="btn" onclick="press('6')">6</button>
    <button class="btn" onclick="press('*')">*</button>
  </div>

  <div>
    <button class="btn" onclick="press('1')">1</button>
    <button class="btn" onclick="press('2')">2</button>
    <button class="btn" onclick="press('3')">3</button>
    <button class="btn" onclick="press('-')">-</button>
  </div>

  <div>
    <button class="btn" onclick="press('0')">0</button>
    <button class="btn" onclick="press('.')">.</button>
    <button class="btn" onclick="press('+')">+</button>
  </div>

  <div>
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let display = document.getElementById("display");

  function press(val) {
    display.value += val;
  }

  function clearDisplay() {
    display.value = "";
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Xato";
    }
  }
</script>

</body>
</html>
